name: Build Agents

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd agent
          pip install -r requirements.txt

      - name: Build PCGuard-Setup.exe
        run: |
          cd agent
          pyinstaller `
            --onefile `
            --windowed `
            --name "PCGuard-Setup" `
            --paths . `
            --hidden-import=psutil `
            --hidden-import=requests `
            --hidden-import=schedule `
            --hidden-import=dotenv `
            --hidden-import=winreg `
            --hidden-import=pystray `
            --hidden-import=pystray._win32 `
            --hidden-import=PIL `
            --hidden-import=PIL.Image `
            --hidden-import=PIL.ImageDraw `
            --hidden-import=modules.scanner `
            --hidden-import=modules.processes `
            --hidden-import=modules.network `
            --hidden-import=modules.privacy `
            --hidden-import=modules.backup `
            --hidden-import=modules.cleaner `
            --hidden-import=modules.network_info `
            setup_wizard.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCGuard-Setup
          path: agent/dist/PCGuard-Setup.exe

      - name: Get version from package.json
        id: version
        shell: bash
        run: echo "VERSION=$(node -p "require('./web-app/package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (Windows)
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.VERSION }}
          name: PCGuard v${{ steps.version.outputs.VERSION }}
          allowUpdates: true
          artifacts: agent/dist/PCGuard-Setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## PCGuard v${{ steps.version.outputs.VERSION }}

            ### Windows Installation
            1. Download **PCGuard-Setup.exe**
            2. Double-click the file
            3. Paste your personal token from the [Setup page](https://pcguard-rami.web.app/setup)
            4. Click **Install** — done!

            ### Linux / VPS Installation
            Run on your server as root:
            ```bash
            curl -sSL https://pcguard-rami.web.app/install.sh | bash
            ```

            > Windows 10/11 · Ubuntu 18+ · Debian 10+ · No technical knowledge needed

      - name: Update latestAgentVersion in Firestore
        shell: bash
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Updating Firestore version to ${VERSION}..."
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://us-central1-pc-security-dashboard.cloudfunctions.net/setLatestAgentVersion" \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"${DEPLOY_SECRET}\",\"windows_version\":\"${VERSION}\",\"linux_version\":\"${VERSION}\",\"changelog\":\"PCGuard v${VERSION}\"}")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | head -1)
          echo "Response body: ${BODY}"
          echo "HTTP status:   ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::setLatestAgentVersion returned HTTP ${HTTP_CODE}"
            exit 1
          fi

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Linux agent
        run: |
          mkdir -p dist-linux
          cp agent-linux/linux_agent.py dist-linux/
          cp agent-linux/requirements-linux.txt dist-linux/
          cp agent-linux/VERSION dist-linux/
          tar -czf PCGuard-Linux.tar.gz -C dist-linux .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCGuard-Linux
          path: PCGuard-Linux.tar.gz

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./web-app/package.json').version")" >> $GITHUB_OUTPUT

      - name: Add Linux package to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.VERSION }}
          name: PCGuard v${{ steps.version.outputs.VERSION }}
          allowUpdates: true
          artifacts: PCGuard-Linux.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          omitBody: true

      - name: Update latestAgentVersion in Firestore
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Updating Firestore version to ${VERSION}..."
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://us-central1-pc-security-dashboard.cloudfunctions.net/setLatestAgentVersion" \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"${DEPLOY_SECRET}\",\"windows_version\":\"${VERSION}\",\"linux_version\":\"${VERSION}\",\"changelog\":\"PCGuard v${VERSION}\"}")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | head -1)
          echo "Response body: ${BODY}"
          echo "HTTP status:   ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::setLatestAgentVersion returned HTTP ${HTTP_CODE}"
            exit 1
          fi
